algorithm_name: nisar_access_subset
algorithm_version: main

algorithm_description: "Subset selected variables from a NISAR GCOV granule and write a Zarr store."

code_repository: https://github.com/HarshiniGirish/NISAR_OGC_JOB

run_command: NISAR_OGC_JOB/generated_package/run.sh
build_command: NISAR_OGC_JOB/generated_package/build.sh

ram_min: 8
cores_min: 2

base_container_url: mas.maap-project.org/root/maap-workspaces/custom_images/maap_base:v5.0.0

inputs:
  - name: access_mode
    label: access_mode
    doc: "Allowed values: auto, s3, https."
    type: string
    default: "auto"
  - name: https_href
    label: https_href
    doc: ""
    type: string
    default: ""
  - name: s3_href
    label: s3_href
    doc: ""
    type: string
    default: ""
  - name: short_name
    label: short_name
    doc: ""
    type: string
    default: "NISAR_L2_GCOV_BETA_V1"
  - name: count
    label: count
    doc: ""
    type: integer
    default: 10
  - name: granule_index
    label: granule_index
    doc: ""
    type: integer
    default: 0
  - name: asf_s3_creds_url
    label: asf_s3_creds_url
    doc: ""
    type: string
    default: "https://nisar.asf.earthdatacloud.nasa.gov/s3credentials"
  - name: group
    label: group
    doc: ""
    type: string
    default: "/science/LSAR/GCOV/grids/frequencyA"
  - name: vars
    label: vars
    doc: ""
    type: string
    default: "HHHH"
  - name: x_path
    label: x_path
    doc: ""
    type: string
    default: "/science/LSAR/GCOV/grids/frequencyA/xCoordinates"
  - name: y_path
    label: y_path
    doc: ""
    type: string
    default: "/science/LSAR/GCOV/grids/frequencyA/yCoordinates"
  - name: bbox
    label: bbox
    doc: ""
    type: string
    default: ""
  - name: bbox_crs
    label: bbox_crs
    doc: ""
    type: string
    default: ""
  - name: out_name
    label: out_name
    doc: ""
    type: string
    default: "nisar_subset.zarr"

outputs:
  - name: out
    type: Directory

outdir_max: 20
