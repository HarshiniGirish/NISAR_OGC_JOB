name: nisar_access_subset
version: main
target: ogc_dps
entrypoint: nisar_access_subset.py

description: "PoC-generated OGC/DPS package for accessing and subsetting a NISAR GCOV granule."
repository_url: "https://github.com/HarshiniGirish/NISAR_OGC_JOB"
base_container: "mas.maap-project.org/root/maap-workspaces/custom_images/maap_base:v5.0.0"

resources:
  ram_min: 8
  cores_min: 2
  outdir_max: 20

inputs:
  access_mode:
    type: string
    default: s3
    description: "Access mode to use: s3, https, or auto."

  s3_href:
    type: string
    default: "s3://sds-n-cumulus-prod-nisar-products/NISAR_L2_GCOV_BETA_V1/NISAR_L2_PR_GCOV_003_005_D_077_4005_DHDH_A_20251017T132451_20251017T132526_X05007_N_F_J_001/NISAR_L2_PR_GCOV_003_005_D_077_4005_DHDH_A_20251017T132451_20251017T132526_X05007_N_F_J_001.h5"
    description: "S3 path to the NISAR GCOV HDF5 file."

  https_href:
    type: string
    default: "https://nisar.asf.earthdatacloud.nasa.gov/NISAR/NISAR_L2_GCOV_BETA_V1/NISAR_L2_PR_GCOV_003_005_D_077_4005_DHDH_A_20251017T132451_20251017T132526_X05007_N_F_J_001/NISAR_L2_PR_GCOV_003_005_D_077_4005_DHDH_A_20251017T132451_20251017T132526_X05007_N_F_J_001.h5"
    description: "HTTPS URL to the NISAR GCOV HDF5 file."

  short_name:
    type: string
    default: NISAR_L2_GCOV_BETA_V1
    description: "Earthdata/CMR short name to search when explicit hrefs are not provided."

  count:
    type: string
    default: "10"
    description: "Maximum CMR search result count."

  granule_index:
    type: string
    default: "0"
    description: "Zero-based index of the search result to use."

  asf_s3_creds_url:
    type: string
    default: "https://nisar.asf.earthdatacloud.nasa.gov/s3credentials"
    description: "ASF endpoint used to request temporary Earthdata S3 credentials."

  vars:
    type: string
    default: HHHH
    description: "Comma-separated variable names to subset."

  group:
    type: string
    default: /science/LSAR/GCOV/grids/frequencyA
    description: "HDF5 group path containing the NISAR GCOV raster variables."

  x_path:
    type: string
    default: /science/LSAR/GCOV/grids/frequencyA/xCoordinates
    description: "HDF5 path to the x coordinate vector."

  y_path:
    type: string
    default: /science/LSAR/GCOV/grids/frequencyA/yCoordinates
    description: "HDF5 path to the y coordinate vector."

  bbox:
    type: string
    default: "750000,2450000,800000,2500000"
    description: "Optional bounding box: minx,miny,maxx,maxy."

  bbox_crs:
    type: string
    default: EPSG:32643
    description: "CRS of the bounding box, for example EPSG:32633."

  out_name:
    type: string
    default: nisar_subset.zarr
    description: "Name of the output Zarr store."

outputs:
  output:
    type: directory
    path: output
    description: "Output directory containing the Zarr result and manifest."

dependencies:
  conda:
    - python=3.11
    - numpy
    - xarray
    - zarr
    - numcodecs
    - h5py
    - h5netcdf
    - earthaccess
    - fsspec
    - s3fs
    - boto3
    - botocore
    - requests
    - pyproj
    - pip
  pip:
    - maap-py
